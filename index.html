<!DOCTYPE html>
<html>
<head>
    <title> R S Computer Coaching Management</title>
    <link rel="stylesheet" href="style.css">
</head>
</div>
<body>

    <div class="top-header">

    <div>
        <h1>Computer Coaching Management System</h1>
    </div>

    <div>
        <img id="logoPreview">
    </div>

</div>

      <div class="button-group">

    <button class="add-btn" onclick="showForm()">
        ➕ Add Student
    </button>

    <button class="add-btn" onclick="showRecords()">
        📋 View Records
    </button>

    <button class="add-btn" onclick="searchStudent()">
        🔍 Search Student
    </button>
    <button class="add-btn" onclick="showSetup()">
    ⚙️ Setup
</button>
</button>

</div>
    </div>

    <div class="dashboard">

       <div class="card students-card">
    <h3>Total Students</h3>
    <p id="studentCount">0</p>
</div>

<div class="card fees-card">
    <h3>Total Fees</h3>
    <p id="totalFeeAmount">₹0</p>
</div>

<div class="card due-card">
    <h3>Due Fees</h3>
    <p id="dueFeeAmount">₹0</p>
</div>
    </div>

    <div id="studentForm" class="form-box">

        <input type="text" id="name" placeholder="Student Name">

        <input type="number" id="age" placeholder="Student Age">

        <input type="text" id="course" placeholder="Course Name">

        <input type="number" id="totalFees" placeholder="Total Fees">

        <input type="number" id="paidFees" placeholder="Paid Fees">

        <button onclick="addStudent()">
            Save Student
        </button>

    </div>

    <table id="studentTable">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Total Fees</th>
            <th>Paid Fees</th>
            <th>Due Fees</th>
            <th>Action</th>
            <th>Receipt</th>
    
        </tr>
    </table>

    <script src="script.js"></script>
    <div id="setupForm" class="form-box" style="display:none;">

    <h2>Coaching Setup</h2>

    <input type="text" id="coachingName"
           placeholder="Coaching Name">

    <input type="text" id="ownerName"
           placeholder="Owner Name">

    <input type="text" id="mobile"
           placeholder="Mobile Number">

    <input type="text" id="address"
           placeholder="Address">
    <input type="file" id="logoFile" accept="image/*">
    <button onclick="saveSetup()">
        Save Details
    </button>

</div>

</body>
</html>
